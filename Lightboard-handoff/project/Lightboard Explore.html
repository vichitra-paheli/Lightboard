<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lightboard · Explore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">

<style>
:root {
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
html, body, #root { height: 100%; margin: 0; padding: 0; background: #08080A; }
body { overflow: hidden; }
* { box-sizing: border-box; }

/* scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1E1E22; border-radius: 6px; border: 2px solid #08080A; }
::-webkit-scrollbar-thumb:hover { background: #2A2A30; }

@keyframes traceIn {
  from { opacity: 0; transform: translateY(2px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(232,155,82,0.15); }
  50%      { box-shadow: 0 0 0 6px rgba(232,155,82,0.05); }
}
@keyframes sigilDraw {
  from { stroke-dashoffset: 50; }
  to   { stroke-dashoffset: 0; }
}
@keyframes sigilSpark {
  0%   { opacity: 0; offset-distance: 0%; }
  10%  { opacity: 1; }
  85%  { opacity: 1; }
  100% { opacity: 0; offset-distance: 100%; }
}
@keyframes cursorBlink {
  0%, 50%  { opacity: 1; }
  51%,100% { opacity: 0; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Wordmark.jsx"></script>
<script type="text/babel" src="components/Chart.jsx"></script>
<script type="text/babel" src="components/AgentTrace.jsx"></script>
<script type="text/babel" src="components/Filmstrip.jsx"></script>
<script type="text/babel" src="components/Shell.jsx"></script>
<script type="text/babel" src="components/Thread.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "traceVariant": "editorial",
  "typography": "space-inter",
  "streaming": false
}/*EDITMODE-END*/;

const TYPOGRAPHY_OPTIONS = {
  'space-inter':   { display: "'Space Grotesk'", body: "'Inter'",         mono: "'JetBrains Mono'", label: 'Space Grotesk · Inter' },
  'plex':          { display: "'IBM Plex Sans'",  body: "'IBM Plex Sans'", mono: "'IBM Plex Mono'",  label: 'IBM Plex Sans' },
  'serif-accent':  { display: "'Instrument Serif'", body: "'Inter'",       mono: "'JetBrains Mono'", label: 'Instrument Serif · Inter' },
};

function applyTypography(key) {
  const t = TYPOGRAPHY_OPTIONS[key] || TYPOGRAPHY_OPTIONS['space-inter'];
  const root = document.documentElement;
  root.style.setProperty('--font-display', `${t.display}, system-ui, sans-serif`);
  root.style.setProperty('--font-body',    `${t.body}, system-ui, sans-serif`);
  root.style.setProperty('--font-mono',    `${t.mono}, ui-monospace, monospace`);
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [filmstripOpen, setFilmstripOpen] = React.useState(false);
  const [traceOpen, setTraceOpen] = React.useState(true);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  React.useEffect(() => { applyTypography(tweaks.typography); }, [tweaks.typography]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const update = (patch) => {
    setTweaks(prev => {
      const next = { ...prev, ...patch };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
      return next;
    });
  };

  // Re-run streaming on toggle
  const [streamKey, setStreamKey] = React.useState(0);
  const onRestream = () => { setStreamKey(k => k + 1); setTraceOpen(true); };

  return (
    <Shell onOpenFilmstrip={() => setFilmstripOpen(true)}>
      <FilmstripButton
        onClick={() => setFilmstripOpen(o => !o)}
        active={filmstripOpen}
      />
      <Thread
        key={streamKey + ':' + tweaks.traceVariant}
        traceVariant={tweaks.traceVariant}
        traceOpen={traceOpen}
        setTraceOpen={setTraceOpen}
        streaming={tweaks.streaming}
      />
      <Composer />
      <Filmstrip
        open={filmstripOpen}
        onClose={() => setFilmstripOpen(false)}
      />
      {tweaksVisible && (
        <TweaksPanel
          tweaks={tweaks}
          update={update}
          onRestream={onRestream}
        />
      )}
    </Shell>
  );
}

function TweaksPanel({ tweaks, update, onRestream }) {
  return (
    <div style={{
      position: 'fixed',
      right: 20,
      bottom: 20,
      zIndex: 50,
      width: 280,
      background: '#0D0D10',
      border: '1px solid #1E1E22',
      borderRadius: 12,
      padding: 14,
      boxShadow: '0 12px 40px rgba(0,0,0,0.45)',
      fontFamily: 'var(--font-body)',
      color: '#EDEDEE',
    }}>
      <div style={{
        fontFamily: 'var(--font-mono)',
        fontSize: 10,
        letterSpacing: '0.14em',
        textTransform: 'uppercase',
        color: '#8A8A92',
        marginBottom: 12,
      }}>Tweaks</div>

      <TweakGroup label="Agent reasoning UI">
        {[
          { id: 'editorial', name: 'Editorial log' },
          { id: 'manifest',  name: 'Quiet manifest' },
          { id: 'ribbon',    name: 'Inline ribbon' },
        ].map(o => (
          <TweakOption
            key={o.id}
            selected={tweaks.traceVariant === o.id}
            onClick={() => update({ traceVariant: o.id })}
          >{o.name}</TweakOption>
        ))}
      </TweakGroup>

      <TweakGroup label="Typography pairing">
        {Object.entries(TYPOGRAPHY_OPTIONS).map(([id, t]) => (
          <TweakOption
            key={id}
            selected={tweaks.typography === id}
            onClick={() => update({ typography: id })}
          >{t.label}</TweakOption>
        ))}
      </TweakGroup>

      <TweakGroup label="Streaming demo">
        <TweakOption
          selected={tweaks.streaming}
          onClick={() => update({ streaming: !tweaks.streaming })}
        >{tweaks.streaming ? 'Stream on new convo' : 'Pre-filled (static)'}</TweakOption>
        <button
          onClick={onRestream}
          style={{
            all: 'unset',
            cursor: 'pointer',
            display: 'block',
            textAlign: 'center',
            marginTop: 6,
            padding: '7px 10px',
            borderRadius: 6,
            background: '#16120B',
            border: '1px solid #3B2E14',
            color: '#F2C265',
            fontSize: 11,
            fontFamily: 'var(--font-mono)',
            letterSpacing: '0.06em',
            textTransform: 'uppercase',
          }}
        >Replay tool calls</button>
      </TweakGroup>
    </div>
  );
}

function TweakGroup({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{
        fontFamily: 'var(--font-mono)',
        fontSize: 9,
        letterSpacing: '0.12em',
        textTransform: 'uppercase',
        color: '#55555C',
        marginBottom: 6,
      }}>{label}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>{children}</div>
    </div>
  );
}

function TweakOption({ selected, onClick, children }) {
  return (
    <button
      onClick={onClick}
      style={{
        all: 'unset',
        cursor: 'pointer',
        padding: '6px 10px',
        borderRadius: 6,
        fontSize: 12,
        color: selected ? '#EDEDEE' : '#8A8A92',
        background: selected ? '#16120B' : 'transparent',
        border: selected ? '1px solid #3B2E14' : '1px solid transparent',
        display: 'flex',
        alignItems: 'center',
        gap: 8,
      }}
    >
      <span style={{
        width: 5, height: 5, borderRadius: 99,
        background: selected ? '#F2C265' : '#2A2A30',
      }} />
      {children}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
