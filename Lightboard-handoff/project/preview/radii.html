<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>body { padding: 22px 24px; } .row { display: flex; align-items: center; gap: 14px; padding: 6px 0; } .label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-5); letter-spacing: 0.08em; width: 50px; } .box { background: var(--bg-3); border: 1px solid var(--line-3); } .token { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-left: auto; }</style></head><body>
<div class="card-label">Radii &amp; spacing</div>
<div class="row"><span class="label">r-xs</span><span class="box" style="width: 28px; height: 28px; border-radius: 4px;"></span><span class="token">4px · chip</span></div>
<div class="row"><span class="label">r-sm</span><span class="box" style="width: 28px; height: 28px; border-radius: 6px;"></span><span class="token">6px · button sm</span></div>
<div class="row"><span class="label">r-md</span><span class="box" style="width: 28px; height: 28px; border-radius: 8px;"></span><span class="token">8px · input</span></div>
<div class="row"><span class="label">r-lg</span><span class="box" style="width: 28px; height: 28px; border-radius: 10px;"></span><span class="token">10px · filmstrip card</span></div>
<div class="row"><span class="label">r-xl</span><span class="box" style="width: 28px; height: 28px; border-radius: 12px;"></span><span class="token">12px · panel</span></div>
<div class="row"><span class="label">r-2xl</span><span class="box" style="width: 28px; height: 28px; border-radius: 14px;"></span><span class="token">14px · chart, composer</span></div>
<div class="row"><span class="label">r-full</span><span class="box" style="width: 28px; height: 28px; border-radius: 999px;"></span><span class="token">999px · pill, dot</span></div>
</body></html>
