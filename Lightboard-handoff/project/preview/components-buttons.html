<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>body { padding: 22px 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
button { all: unset; cursor: pointer; font-family: var(--font-body); font-size: 12px; transition: all 180ms cubic-bezier(.2,.8,.2,1); }
.primary { padding: 8px 14px; border-radius: 99px; background: #EDEDEE; color: #0A0A0C; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
.pill { padding: 6px 12px; border-radius: 99px; border: 1px solid #26262C; background: #131317; color: #BDBDC4; display: inline-flex; align-items: center; gap: 6px; }
.pill-amber { padding: 7px 12px; border-radius: 99px; background: #16120B; border: 1px solid #3B2E14; color: #F2C265; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; }
.ghost { padding: 6px 12px; border-radius: 8px; color: #8A8A92; }
.ghost:hover { background: #131317; color: #EDEDEE; }
.icon { width: 30px; height: 30px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: #55555C; }
.icon:hover { background: #18181C; color: #EDEDEE; }
</style></head><body>
<button class="primary">Send <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 5h7M5 1l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button>
<button class="pill"><svg width="11" height="11" viewBox="0 0 11 11"><path d="M1 2h9M2.5 5.5h6M4 9h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Filters</button>
<button class="pill">PNG</button>
<button class="pill-amber">Filmstrip <span style="font-family: var(--font-mono); font-size: 10px; color: #55555C;">6</span></button>
<button class="ghost">Explore</button>
<button class="icon"><svg width="13" height="13" viewBox="0 0 13 13"><path d="M9.5 4.5L4 10a2 2 0 102.8 2.8L12 7.5a3.5 3.5 0 00-5-5L1.8 7.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg></button>
</body></html>
