<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>body { padding: 22px 24px; }</style></head><body>
<div style="background: #0F0F12; border: 1px solid #1E1E22; border-radius: 12px; overflow: hidden;">
  <div style="display: flex; align-items: center; justify-content: space-between; padding: 14px 20px;">
    <div style="display: flex; align-items: center; gap: 12px;">
      <span style="width: 8px; height: 8px; border-radius: 99px; background: #7DB469;"></span>
      <span style="font-family: var(--font-body); font-size: 13px; color: #EDEDEE; font-weight: 500;">Completed</span>
      <span style="font-family: var(--font-mono); font-size: 11px; color: #6B6B73; letter-spacing: 0.04em;">12/12 tool calls</span>
    </div>
    <svg width="10" height="10" viewBox="0 0 10 10" style="color: #6B6B73;"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  </div>
  <div style="border-top: 1px solid #1A1A1E; padding: 6px 20px 16px;">
    <div style="position: relative; padding-left: 10px;">
      <div style="position: absolute; left: 3px; top: 8px; bottom: 8px; border-left: 1px dashed #26262C;"></div>
      <div style="display: grid; grid-template-columns: 70px 1fr auto; gap: 14px; align-items: baseline; padding: 6px 0 6px 14px; position: relative;">
        <div style="position: absolute; left: -2px; top: 12px; width: 8px; height: 8px; border-radius: 99px; background: #0F0F12; border: 1.5px solid #8AB4B8;"></div>
        <div style="font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #8AB4B8;">schema</div>
        <div style="font-family: var(--font-mono); font-size: 11.5px; color: #BDBDC4;"><span style="color: #EDEDEE">introspect_schema</span><span style="color: #55555C">(</span>cricket.ball_by_ball<span style="color: #55555C">)</span></div>
        <div style="font-family: var(--font-mono); font-size: 10px; color: #55555C;">42ms</div>
      </div>
      <div style="display: grid; grid-template-columns: 70px 1fr auto; gap: 14px; align-items: baseline; padding: 6px 0 6px 14px; position: relative;">
        <div style="position: absolute; left: -2px; top: 12px; width: 8px; height: 8px; border-radius: 99px; background: #0F0F12; border: 1.5px solid #E89B52;"></div>
        <div style="font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #E89B52;">query</div>
        <div style="font-family: var(--font-mono); font-size: 11.5px; color: #BDBDC4;"><span style="color: #EDEDEE">sql</span><span style="color: #55555C">(</span>SELECT batter, SUM(runs) …<span style="color: #55555C">)</span> <span style="color: #6B6B73">→ 412 rows</span></div>
        <div style="font-family: var(--font-mono); font-size: 10px; color: #55555C;">312ms</div>
      </div>
      <div style="display: grid; grid-template-columns: 70px 1fr auto; gap: 14px; align-items: baseline; padding: 6px 0 6px 14px; position: relative;">
        <div style="position: absolute; left: -2px; top: 12px; width: 8px; height: 8px; border-radius: 99px; background: #0F0F12; border: 1.5px solid #7DB469;"></div>
        <div style="font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #7DB469;">narrate</div>
        <div style="font-family: var(--font-mono); font-size: 11.5px; color: #BDBDC4;"><span style="color: #EDEDEE">summarize</span><span style="color: #55555C">(</span>key takeaways · 3 bullets<span style="color: #55555C">)</span></div>
        <div style="font-family: var(--font-mono); font-size: 10px; color: #55555C;">204ms</div>
      </div>
    </div>
  </div>
</div>
</body></html>
