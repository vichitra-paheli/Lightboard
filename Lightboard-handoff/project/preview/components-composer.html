<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>body { padding: 22px 24px; }</style></head><body>
<div style="padding: 12px 14px; border-radius: 14px; border: 1px solid #3B2E14; background: #0D0D10; display: flex; flex-direction: column; gap: 10px;">
  <div style="min-height: 40px; font-family: var(--font-body); font-size: 14px; color: var(--ink-3);">Ask a follow-up, or slice the data further…</div>
  <div style="display: flex; align-items: center; justify-content: space-between;">
    <div style="display: flex; gap: 4px;">
      <span style="width: 30px; height: 30px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: #55555C;">
        <svg width="13" height="13" viewBox="0 0 13 13"><path d="M9.5 4.5L4 10a2 2 0 102.8 2.8L12 7.5a3.5 3.5 0 00-5-5L1.8 7.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>
      </span>
      <span style="width: 30px; height: 30px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: #55555C;">
        <svg width="13" height="13" viewBox="0 0 13 13"><path d="M3 3v8l7-4-7-4z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg>
      </span>
    </div>
    <button style="all: unset; padding: 8px 14px; border-radius: 99px; background: #EDEDEE; color: #0A0A0C; font-family: var(--font-body); font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px;">
      Send <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 5h7M5 1l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </button>
  </div>
</div>
<div style="margin-top: 8px; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 9.5px; color: #3E3E45; letter-spacing: 0.08em; text-transform: uppercase;">
  <span>cricket · 24 tables · 42.1M rows</span>
  <span>⌘ ⏎ send   ⏎ newline</span>
</div>
</body></html>
