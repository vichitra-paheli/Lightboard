<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>body { padding: 22px 24px; display: flex; flex-direction: column; gap: 14px; } .row { display: flex; align-items: center; gap: 14px; } .token { font-family: var(--font-mono); font-size: 10px; color: var(--ink-5); letter-spacing: 0.08em; width: 110px; }</style></head><body>
<div class="card-label">Shadow &amp; glow</div>
<div class="row">
  <span class="token">shadow-pop</span>
  <div style="padding: 10px 16px; border-radius: 99px; background: #EDEDEE; color: #0A0A0C; font-family: var(--font-body); font-size: 12px; box-shadow: 0 4px 14px rgba(237,237,238,0.12);">Send</div>
  <span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-left: auto;">hover lift · send button</span>
</div>
<div class="row">
  <span class="token">shadow-panel</span>
  <div style="padding: 14px 18px; border-radius: 12px; background: #0D0D10; border: 1px solid #1E1E22; color: var(--ink-1); font-family: var(--font-body); font-size: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.45);">Tweaks panel</div>
  <span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-left: auto;">floating overlay</span>
</div>
<div class="row">
  <span class="token">glow-accent</span>
  <div style="display: inline-flex; align-items: center; padding: 12px 20px;">
    <span style="width: 8px; height: 8px; border-radius: 99px; background: #E89B52; box-shadow: 0 0 0 3px rgba(232,155,82,0.15);"></span>
  </div>
  <span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-left: auto;">agent "thinking" pulse</span>
</div>
</body></html>
