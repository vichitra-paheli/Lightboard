<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>body { padding: 22px 24px; }</style></head><body>
<div class="card-label">Accent · warm amber (used sparingly)</div>
<div class="swatch-row">
  <div class="swatch"><div class="chip" style="background: #F2C265"></div><div class="name">accent</div><div class="hex">#F2C265</div></div>
  <div class="swatch"><div class="chip" style="background: #E89B52"></div><div class="name">accent-warm</div><div class="hex">#E89B52</div></div>
  <div class="swatch"><div class="chip" style="background: #D97A44"></div><div class="name">accent-deep</div><div class="hex">#D97A44</div></div>
  <div class="swatch"><div class="chip" style="background: #D9A441"></div><div class="name">accent-ink</div><div class="hex">#D9A441</div></div>
  <div class="swatch"><div class="chip" style="background: #16120B; border: 1px solid #3B2E14"></div><div class="name">accent-bg</div><div class="hex">#16120B</div></div>
  <div class="swatch"><div class="chip" style="background: #3B2E14"></div><div class="name">accent-border</div><div class="hex">#3B2E14</div></div>
</div>
<div style="margin-top: 14px; padding: 10px 12px; border-radius: 8px; background: #16120B; border: 1px solid #3B2E14; font-family: var(--font-body); font-size: 12px; color: #D9A441;">
  <span style="font-family: var(--font-mono); font-size: 10px;">⚠ </span>
  Caveat / accent surface — pinned, outlier, active state.
</div>
</body></html>
