<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.section { display: flex; flex-direction: column; gap: 8px; }
.family {
  font-family: var(--font-display);
  font-size: 34px; font-weight: 600; letter-spacing: -0.02em; color: var(--ink-1);
  line-height: 1;
}
.family.body { font-family: var(--font-body); font-weight: 500; }
.family.mono { font-family: var(--font-mono); font-weight: 400; font-size: 22px; letter-spacing: 0; }
.row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; }
.meta { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-5); letter-spacing: 0.08em; }
.sample { font-size: 11px; color: var(--ink-3); }
</style></head><body>
<div class="section">
  <div class="row">
    <div class="family">Space Grotesk</div>
    <div class="meta">DISPLAY · 400 500 600 700</div>
  </div>
  <div class="sample" style="font-family: var(--font-display);">The quick brown fox jumps over the lazy dog · 0123456789</div>
</div>
<div class="section">
  <div class="row">
    <div class="family body">Inter</div>
    <div class="meta">BODY · 400 450 500 600</div>
  </div>
  <div class="sample" style="font-family: var(--font-body);">The quick brown fox jumps over the lazy dog · 0123456789</div>
</div>
<div class="section">
  <div class="row">
    <div class="family mono">JetBrains Mono</div>
    <div class="meta">MONO · 400 500</div>
  </div>
  <div class="sample" style="font-family: var(--font-mono);">sql · rank · introspect_schema · +11.59 · 2014–2024</div>
</div>
</body></html>
